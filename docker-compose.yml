version: '3.8'\n\nservices:\n  mongodb:\n    image: mongo:6.0\n    container_name: education-db\n    ports:\n      - \"27017:27017\"\n    volumes:\n      - mongodb_data:/data/db\n    environment:\n      MONGO_INITDB_DATABASE: education-narrative\n    networks:\n      - education-network\n\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    container_name: education-api\n    ports:\n      - \"5000:5000\"\n    environment:\n      - NODE_ENV=production\n      - MONGODB_URI=mongodb://mongodb:27017/education-narrative\n      - JWT_SECRET=your-secret-key-change-in-production\n      - CORS_ORIGIN=http://localhost:3000\n    depends_on:\n      - mongodb\n    networks:\n      - education-network\n    restart: unless-stopped\n\n  frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile\n    container_name: education-web\n    ports:\n      - \"3000:80\"\n    depends_on:\n      - backend\n    networks:\n      - education-network\n    restart: unless-stopped\n\nvolumes:\n  mongodb_data:\n\nnetworks:\n  education-network:\n    driver: bridge\n